<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Menstrual Cycle App - Main Dashboard</title>
<!-- BEGIN: Scripts and Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          },
          colors: {
            'app-bg': '#121212',
            'app-card': '#1E1E1E',
            'app-accent': '#FF4D6D',
            'app-secondary': '#A8A8A8',
          }
        }
      }
    }
  </script>
<!-- END: Scripts and Fonts -->
<style data-purpose="layout-animations">
    @keyframes drip {
      0% {
        transform: translateY(-100px) scaleY(1.5);
        opacity: 0;
      }
      20% {
        opacity: 0.7;
      }
      80% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(120vh) scaleY(1);
        opacity: 0;
      }
    }
    .drip-effect {
      position: absolute;
      top: -20px;
      width: 2px;
      height: 25px;
      background: linear-gradient(to bottom, transparent, #FF4D6D);
      border-radius: 0 0 2px 2px;
      animation: drip 4s linear infinite;
      filter: blur(0.5px);
    }
    /* Droplet head */
    .drip-effect::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 2px;
      height: 2px;
      background: #FF4D6D;
      border-radius: 50%;
      box-shadow: 0 0 4px #FF4D6D;
    }
    
    .cycle-glow {
      box-shadow: 0 0 30px rgba(255, 77, 109, 0.2);
    }
  </style>
</head>
<body class="bg-app-bg text-white font-sans min-h-screen flex flex-col pb-24">
<!-- BEGIN: Drip Animation Background -->
<div class="fixed top-0 left-0 w-full h-32 pointer-events-none overflow-hidden z-0" data-purpose="active-state-animation">
<div class="drip-effect" style="left: 5%; animation-delay: 0s; animation-duration: 3s;"></div>
<div class="drip-effect" style="left: 15%; animation-delay: 1.5s; animation-duration: 4.5s;"></div>
<div class="drip-effect" style="left: 25%; animation-delay: 0.8s; animation-duration: 3.8s;"></div>
<div class="drip-effect" style="left: 35%; animation-delay: 2.2s; animation-duration: 5s;"></div>
<div class="drip-effect" style="left: 45%; animation-delay: 0.3s; animation-duration: 3.2s;"></div>
<div class="drip-effect" style="left: 55%; animation-delay: 1.8s; animation-duration: 4.2s;"></div>
<div class="drip-effect" style="left: 65%; animation-delay: 0.7s; animation-duration: 3.5s;"></div>
<div class="drip-effect" style="left: 75%; animation-delay: 2.5s; animation-duration: 4.8s;"></div>
<div class="drip-effect" style="left: 85%; animation-delay: 1.1s; animation-duration: 3.7s;"></div>
<div class="drip-effect" style="left: 95%; animation-delay: 0.5s; animation-duration: 4s;"></div>
</div>
<!-- END: Drip Animation Background -->
<!-- BEGIN: Header -->
<header class="p-6 pt-12 flex justify-between items-center z-10" data-purpose="top-navigation">
<div>
<h1 class="text-2xl font-bold tracking-tight">Merhaba, Ayşe</h1>
<p class="text-app-secondary text-sm">Bugün harika görünüyorsun.</p>
</div>
<div class="w-10 h-10 rounded-full bg-app-card border border-white/10 flex items-center justify-center">
<svg class="h-6 w-6 text-app-accent" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Dashboard Content -->
<main class="flex-grow px-6 flex flex-col items-center gap-8 z-10">
<!-- BEGIN: Cycle Indicator -->
<section class="relative flex flex-col items-center" data-purpose="cycle-display">
<!-- Main Circular Indicator -->
<div class="w-72 h-72 rounded-full border-4 border-app-accent/20 flex flex-col items-center justify-center relative cycle-glow bg-app-card/30 backdrop-blur-sm">
<div class="absolute inset-0 rounded-full border-t-4 border-app-accent rotate-[45deg]"></div>
<span class="text-app-secondary text-sm font-medium uppercase tracking-widest">Döngünün</span>
<span class="text-5xl font-extrabold my-1">14. Günü</span>
<span class="text-app-accent font-semibold text-lg">Yumurtlama Dönemi</span>
<div class="mt-4 px-4 py-1.5 bg-app-accent/10 rounded-full border border-app-accent/30">
<span class="text-app-accent text-sm font-medium">Adete 12 gün kaldı</span>
</div>
</div>
<!-- Secondary Metric -->
<div class="mt-6 flex items-center gap-2 text-app-secondary" data-purpose="cycle-gap-metric">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-sm">Döngü aralığı: 28 gün</span>
</div>
</section>
<!-- END: Cycle Indicator -->
<!-- BEGIN: Water Tracker Widget -->
<section class="w-full bg-app-card rounded-custom p-5 border border-white/5" data-purpose="water-tracker">
<div class="flex justify-between items-center mb-4">
<h3 class="font-bold text-lg">Su Takibi</h3>
<span class="text-xs text-app-secondary">Hedef: 2.5L</span>
</div>
<div class="flex items-center gap-4">
<!-- Visual Glass Icons -->
<div class="flex gap-2 flex-grow overflow-x-auto pb-1">
<!-- Active Glasses -->
<div class="text-blue-400">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24"><path d="M18.3 2H5.7c-.4 0-.7.3-.8.7l-1.6 18c0 .4.3.8.7.8h16c.4 0 .7-.4.7-.8l-1.6-18c-.1-.4-.4-.7-.8-.7z"></path></svg>
</div>
<div class="text-blue-400">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24"><path d="M18.3 2H5.7c-.4 0-.7.3-.8.7l-1.6 18c0 .4.3.8.7.8h16c.4 0 .7-.4.7-.8l-1.6-18c-.1-.4-.4-.7-.8-.7z"></path></svg>
</div>
<div class="text-blue-400">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24"><path d="M18.3 2H5.7c-.4 0-.7.3-.8.7l-1.6 18c0 .4.3.8.7.8h16c.4 0 .7-.4.7-.8l-1.6-18c-.1-.4-.4-.7-.8-.7z"></path></svg>
</div>
<!-- Empty Glasses -->
<div class="text-gray-700">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24"><path d="M18.3 2H5.7c-.4 0-.7.3-.8.7l-1.6 18c0 .4.3.8.7.8h16c.4 0 .7-.4.7-.8l-1.6-18c-.1-.4-.4-.7-.8-.7z"></path></svg>
</div>
<div class="text-gray-700">
<svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24"><path d="M18.3 2H5.7c-.4 0-.7.3-.8.7l-1.6 18c0 .4.3.8.7.8h16c.4 0 .7-.4.7-.8l-1.6-18c-.1-.4-.4-.7-.8-.7z"></path></svg>
</div>
</div>
<!-- Add Button -->
<button class="bg-blue-500 hover:bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
<div class="mt-3 text-sm text-app-secondary">
        Bugün <span class="text-white font-semibold">1.5L</span> içildi
      </div>
</section>
<!-- END: Water Tracker Widget -->
</main>
<!-- END: Main Dashboard Content -->

<nav class="fixed bottom-0 left-0 w-full bg-app-card border-t border-white/5 px-4 pb-8 pt-3 flex justify-between items-center z-50" data-purpose="main-footer-nav">
