<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hoş Geldiniz - Menstrual Döngü Takibi</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-pink': '#FF4D6D',
            'brand-pink-light': '#FFCCD5',
            'brand-bg': '#FFF0F3',
          },
          fontFamily: {
            manrope: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px', // Based on ROUND_EIGHT
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #FFF0F3; /* Soft pink background */
      font-family: 'Manrope', sans-serif;
    }
    
    /* Decorative Illustration elements */
    .bg-illustration-1 {
      position: absolute;
      top: -5%;
      right: -10%;
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-illustration-2 {
      position: absolute;
      bottom: -5%;
      left: -10%;
      opacity: 0.15;
      pointer-events: none;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden">
<!-- BEGIN: DecorativeBackground -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<!-- Abstract Floral/Medical shapes -->
<svg class="bg-illustration-1 w-64 h-64" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<path d="M44.7,-76.4C58.2,-69.2,69.7,-57.4,77.3,-43.8C84.8,-30.2,88.5,-15.1,87.4,-0.6C86.3,13.8,80.5,27.7,72.1,40C63.7,52.4,52.7,63.1,39.8,70.1C26.9,77.1,13.5,80.4,-0.6,81.4C-14.7,82.4,-29.4,81.1,-42.6,74.5C-55.8,67.8,-67.5,55.9,-75.4,42.2C-83.3,28.5,-87.4,14.3,-86.6,0.5C-85.7,-13.3,-80,-26.6,-71.4,-38.9C-62.8,-51.2,-51.4,-62.4,-38.4,-69.9C-25.5,-77.4,-12.7,-81.1,1.1,-83C14.9,-84.9,29.8,-84.9,44.7,-76.4Z" fill="#FF4D6D" transform="translate(100 100)"></path>
</svg>
<svg class="bg-illustration-2 w-80 h-80" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<path d="M38.1,-63.5C51.1,-58.5,64.4,-51.1,72.4,-39.8C80.3,-28.4,82.9,-13.2,80.5,1.4C78.1,16,70.7,30,61.4,42C52,54,40.7,64.1,27.5,69.5C14.4,74.9,-0.6,75.7,-15.8,73.1C-31,70.5,-46.4,64.6,-57.8,54.2C-69.2,43.7,-76.7,28.7,-79.8,12.7C-82.9,-3.3,-81.7,-20.3,-74.6,-34.7C-67.6,-49.2,-54.6,-61,-40.4,-65.4C-26.2,-69.8,-13.1,-66.8,0.3,-67.3C13.7,-67.8,27.4,-71.7,38.1,-63.5Z" fill="#FF4D6D" transform="translate(100 100)"></path>
</svg>
</div>
<!-- END: DecorativeBackground -->
<!-- BEGIN: OnboardingContainer -->
<main class="relative z-10 w-full max-w-md px-8 py-12 flex flex-col min-h-[80vh] justify-between">
<!-- Header Section -->
<header class="space-y-4 text-center mt-10">
<h1 class="text-4xl font-extrabold text-brand-pink tracking-tight">
        Hoş Geldiniz
      </h1>
<p class="text-gray-600 text-lg font-medium">
        Sizi daha yakından tanımak isteriz.
      </p>
</header>
<!-- Form Section -->
<section class="flex-grow flex flex-col justify-center space-y-8" data-purpose="user-input-section">
<div class="space-y-2">
<label class="block text-xl font-semibold text-gray-800 ml-1" for="user-name">
          Adın nedir?
        </label>
<input autofocus="" class="w-full h-14 px-6 bg-white border-2 border-brand-pink-light rounded-custom focus:border-brand-pink focus:ring-0 text-gray-700 text-lg transition-all placeholder:text-gray-400" id="user-name" name="user-name" placeholder="Adınızı yazın" type="text"/>
</div>
</section>
<!-- Footer Action Section -->
<footer class="pb-10" data-purpose="navigation-section">
<button class="w-full py-4 bg-brand-pink text-white font-bold text-lg rounded-custom shadow-lg shadow-brand-pink/20 hover:bg-brand-pink/90 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" id="continue-btn" type="button">
<span>Devam Et</span>
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" fill-rule="evenodd"></path>
</svg>
</button>
<!-- Skip or secondary link -->
<div class="mt-6 text-center">
<p class="text-gray-400 text-sm">
          Gizliliğiniz bizim için önemlidir.
        </p>
</div>
</footer>
</main>
<!-- END: OnboardingContainer -->
<script data-purpose="button-interaction">
    // Simple visual feedback for button
    document.getElementById('continue-btn').addEventListener('click', function() {
      const name = document.getElementById('user-name').value.trim();
      if(name) {
        this.innerHTML = 'Hazırlanıyor...';
        this.classList.add('opacity-80');
        // Simulated navigation delay
        setTimeout(() => {
          alert('Hoş geldin, ' + name + '!');
          this.innerHTML = 'Devam Et';
          this.classList.remove('opacity-80');
        }, 800);
      } else {
        document.getElementById('user-name').classList.add('border-red-400');
        setTimeout(() => {
          document.getElementById('user-name').classList.remove('border-red-400');
        }, 1500);
      }
    });
  </script>
</body></html>
